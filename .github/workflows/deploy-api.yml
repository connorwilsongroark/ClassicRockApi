name: Deploy API to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "src/ClassicRock.Api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Build with dotnet
        run: dotnet build src/ClassicRock.Api/ClassicRock.Api.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish src/ClassicRock.Api/ClassicRock.Api.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A1C734A97FF143C09A785B0CFA830461 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2ED0A18D2FCE4648B9FD6995DE61A1BB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_958A8BF2308D458FB78B0ACECB975847 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "classicrock-api-connorwg"
          slot-name: "Production"
          package: .
